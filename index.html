<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Calculator</title>
</head>

<body>

    <!-- for calculator  -->

    <section class="calculator" id="calculator">

        <div class="cal-box">
            <input type="text" name="screen" id="screen">

            <table class="button-box">
                <tr>
                    <td><button>(</button></td>
                    <td><button>)</button></td>
                    <td><button style="background-color: rgba(48, 13, 177, 0.774);">C</button></td>
                    <td><button
                            style="background-color: rgba(226, 193, 9, 0.774);">Del</button>
                    </td>
                </tr>
                <tr>
                    <td><button>7</button></td>
                    <td><button>8</button></td>
                    <td><button>9</button></td>
                    <td><button>X</button></td>
                </tr>
                <tr>
                    <td><button>4</button></td>
                    <td><button>5</button></td>
                    <td><button>6</button></td>
                    <td><button>-</button></td>
                </tr>
                <tr>
                    <td><button>1</button></td>
                    <td><button>2</button></td>
                    <td><button>3</button></td>
                    <td><button>+</button></td>
                </tr>
                <tr>
                    <td><button>0</button></td>
                    <td><button>.</button></td>
                    <td><button>/</button></td>
                    <td><button style="background-color: rgba(0, 128, 0, 0.651);">=</button></td>
                </tr>
            </table>
        </div>

    </section>








    <script src="calculator.js"></script>
</body>

</html>
